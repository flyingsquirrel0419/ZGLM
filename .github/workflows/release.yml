name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.4.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

      - name: Run tests
        run: pnpm test

      - name: Build workspace
        run: pnpm build

  package:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux
            arch: x64
          - runner: ubuntu-24.04-arm
            platform: linux
            arch: arm64
          - runner: macos-13
            platform: darwin
            arch: x64
          - runner: macos-14
            platform: darwin
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.4.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm build

      - name: Build release bundle
        run: >
          node scripts/build-release-bundle.mjs
          --platform "${{ matrix.platform }}"
          --arch "${{ matrix.arch }}"
          --version "${GITHUB_REF_NAME#v}"

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: zglm-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/release/zglm-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz
          if-no-files-found: error

  release:
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download packaged bundles
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          find release-artifacts -type f -name '*.tar.gz' -exec cp {} release/ \;
          sed "s|__REPO__|${GITHUB_REPOSITORY}|g" scripts/install.template.sh > release/install.sh
          chmod +x release/install.sh
          (
            cd release
            sha256sum ./* > SHA256SUMS.txt
          )

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*
